# ==========================================
# 基本設定
# ==========================================
# カラー設定 (True Color対応)
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# プレフィックスを Ctrl-Space に変更
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# マウス操作を有効にする
set -g mouse on

# ウィンドウ番号を 1 から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウ名をコマンド名にする
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# ターミナルのウィンドウタイトルにセッション名を表示
set -g set-titles on
set -g set-titles-string "#{session_name}"

# ==========================================
# ペイン操作 & キーバインド
# ==========================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt + 矢印キー でペイン移動
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Ctrl + k でリセット
bind -n C-k send-keys -R \; clear-history \; send-keys C-l

# ==========================================
# コピーモード (Viライク)
# ==========================================
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || true"
unbind -T copy-mode-vi MouseDragEnd1Pane

# lazygit ポップアップ
bind g display-popup -E -w 90% -h 90% -d '#{pane_current_path}' -B "lazygit"

# 改行を除去してURLを抽出・ブラウザで開く (prefix + y)
bind y run-shell "url=$(tmux capture-pane -p -S -50 | tr -d '\n' | grep -oE 'https?://[^[:space:]]+' | tail -1) && xdg-open \"$url\" 2>/dev/null && tmux display-message 'Opened: '\"$url\""

# ==========================================
# Catppuccin テーマ設定
# ==========================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# --- ウィンドウの見た目 ---
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_default_background "#313244"

set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_background "#fab387"
set -g @catppuccin_window_current_color "#11111b"

set -g status-position top

# ステータスライン構成
set -g status-left-length 100
set -g status-right-length 200
set -g status-left "#{?client_prefix,#[bg=#f38ba8]#[fg=#11111b] ● PREFIX ACTIVE #[default],}"
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_gitmux}#{E:@catppuccin_status_date_time}"

# Git連携
set -g @catppuccin_gitmux_text "#(gitmux -cfg $HOME/.gitmux.conf \"#{pane_current_path}\")"

# ==========================================
# TPM (Tmux Plugin Manager)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'

# Thumbs設定
set -g @thumbs-command 'echo -n {} | xclip -selection clipboard 2>/dev/null || true'

# Resurrect/Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPMの実行 (必須)
run '~/.tmux/plugins/tpm/tpm'

# ==========================================
# 【重要】視認性向上のための強制上書き設定
# TPM実行後に記述することで確実に適用させる
# ==========================================

# 1. コピーモードの強調
set -g mode-style "fg=#1e1e2e,bg=#fab387,bold"

# 2. ペインの境界線（太さで強調）
set -g pane-border-lines heavy

# 3. ペインの色分け
set -g window-style 'fg=#a6adc8,bg=#11111b'
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e'

# 4. 境界線の色
set -g pane-active-border-style "fg=#fab387,bg=#1e1e2e"
set -g pane-border-style "fg=#313244,bg=#11111b"

# 5. 文字の色
set -wg window-style 'fg=#585b70,bg=#11111b'
set -wg window-active-style 'fg=#cdd6f4,bg=#1e1e2e'
