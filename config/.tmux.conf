# Color settings (True Color)
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Prefix changed to Ctrl-Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Mouse enabled
set -g mouse on

# Window numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1

# Auto-rename windows
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# Terminal title
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alt+arrow for pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Ctrl+k for reset
bind -n C-k send-keys -R \; clear-history \; send-keys C-l

# Vi copy mode (use xclip instead of pbcopy for Linux)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || true"
unbind -T copy-mode-vi MouseDragEnd1Pane

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'

# Thumbs settings
set -g @thumbs-command 'echo -n {} | xclip -selection clipboard 2>/dev/null || true'

# Resurrect/Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM execution
run '~/.tmux/plugins/tpm/tpm'

# Catppuccin-inspired visual overrides (after TPM)
set -g mode-style "fg=#1e1e2e,bg=#fab387,bold"
set -g pane-border-lines heavy
set -g window-style 'fg=#a6adc8,bg=#11111b'
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e'
set -g pane-active-border-style "fg=#fab387,bg=#1e1e2e"
set -g pane-border-style "fg=#313244,bg=#11111b"
set -wg window-style 'fg=#585b70,bg=#11111b'
set -wg window-active-style 'fg=#cdd6f4,bg=#1e1e2e'
